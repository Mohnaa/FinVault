<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinVault — Personal Investment Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --surface2: #f1efea;
      --text: #1a1a18;
      --text2: #6b6b66;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-bg: #E1F5EE;
      --radius: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --surface2: #2e2e2b;
        --text: #f0efe8;
        --text2: #9a9a94;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
        --green-bg: #0a3326;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 40px; height: 40px; background: var(--green-bg); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 20px; }
    .logo-text { font-size: 20px; font-weight: 600; }
    .logo-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .add-btn { background: var(--green); color: #fff; border: none; border-radius: var(--radius); padding: 9px 18px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500; transition: background .15s; }
    .add-btn:hover { background: var(--green-dark); }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .metric { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; }
    .metric-label { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
    .metric-value { font-size: 24px; font-weight: 600; }
    .metric-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .section-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 7px; color: var(--text); margin-bottom: 10px; }
    .section-title i { color: var(--green); font-size: 18px; }
    /* Allocation */
    .alloc-bar { height: 10px; border-radius: 20px; overflow: hidden; display: flex; gap: 2px; margin-bottom: 8px; }
    .alloc-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; }
    .alloc-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .alloc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    /* Reminders */
    .reminder { background: var(--surface); border: 0.5px solid #EF9F27; border-radius: var(--radius-lg); padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .reminder i { font-size: 18px; flex-shrink: 0; }
    .reminder-body { flex: 1; }
    .reminder-body p { font-size: 13px; }
    .reminder-body span { font-size: 12px; color: var(--text2); }
    /* Tabs */
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border); color: var(--text2); background: none; transition: all .15s; }
    .tab.active { background: var(--green-bg); color: var(--green-dark); border-color: var(--green); font-weight: 500; }
    /* Investment cards */
    .inv-list { display: flex; flex-direction: column; gap: 8px; }
    .inv-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; display: flex; align-items: center; gap: 12px; transition: border-color .15s; }
    .inv-card:hover { border-color: var(--border2); }
    .inv-icon { width: 40px; height: 40px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .inv-main { flex: 1; min-width: 0; }
    .inv-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inv-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 3px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .inv-meta-text { font-size: 12px; color: var(--text2); }
    .inv-right { text-align: right; flex-shrink: 0; }
    .inv-amount { font-size: 15px; font-weight: 600; }
    .inv-gain { font-size: 12px; margin-top: 2px; }
    .gain-pos { color: #0F6E56; }
    .gain-neg { color: #A32D2D; }
    .gain-neu { color: var(--text2); }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 6px; border-radius: 6px; font-size: 16px; transition: color .15s, background .15s; }
    .del-btn:hover { color: #E24B4A; background: #FCEBEB; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; border: 0.5px dashed var(--border2); border-radius: var(--radius-lg); }
    .empty i { font-size: 36px; display: block; margin-bottom: 10px; opacity: .35; }
    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 100; }
    .modal { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 100%; max-width: 480px; padding: 1.75rem; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
    .form-row { margin-bottom: 14px; }
    .form-label { font-size: 12px; color: var(--text2); font-weight: 500; display: block; margin-bottom: 5px; }
    .form-row input, .form-row select { width: 100%; padding: 9px 12px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text); outline: none; transition: border-color .15s; }
    .form-row input:focus, .form-row select:focus { border-color: var(--green); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer { display: flex; gap: 10px; margin-top: 1.5rem; }
    .btn-cancel { flex: 1; background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 10px; font-size: 14px; cursor: pointer; color: var(--text); transition: background .15s; }
    .btn-cancel:hover { background: var(--surface2); }
    .btn-save { flex: 2; background: var(--green); color: #fff; border: none; border-radius: var(--radius); padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .btn-save:hover { background: var(--green-dark); }
    /* Export */
    .export-btn { background: none; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 5px; transition: all .15s; }
    .export-btn:hover { border-color: var(--border2); color: var(--text); }
    section { margin-bottom: 1.75rem; }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-building-bank"></i></div>
      <div>
        <div class="logo-text">FinVault</div>
        <div class="logo-sub">Personal wealth tracker</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="export-btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      <button class="add-btn" onclick="openModal()"><i class="ti ti-plus"></i> Add Investment</button>
    </div>
  </div>

  <section id="metrics-section"></section>

  <section id="alloc-section"></section>

  <section id="reminders-section"></section>

  <section>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-title"><i class="ti ti-layout-list"></i> Investments</div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="inv-list" id="inv-list"></div>
  </section>
</div>

<!-- Modal -->
<div class="overlay" id="modal" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
    <div class="modal-title"><i class="ti ti-plus-circle" style="color:var(--green)"></i> <span id="modal-heading">Add Investment</span></div>
    <div class="form-row">
      <label class="form-label">Investment Name *</label>
      <input id="f-name" placeholder="e.g. SBI Bluechip Fund, LIC Policy, HDFC FD" />
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label class="form-label">Category *</label>
        <select id="f-cat"></select>
      </div>
      <div class="form-row">
        <label class="form-label">Platform / Provider</label>
        <input id="f-platform" placeholder="e.g. Zerodha, HDFC" />
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label class="form-label">Amount Invested (₹) *</label>
        <input id="f-invested" type="number" min="0" placeholder="50000" />
      </div>
      <div class="form-row">
        <label class="form-label">Current Value (₹)</label>
        <input id="f-current" type="number" min="0" placeholder="Leave blank if same" />
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label class="form-label">Start Date</label>
        <input id="f-start" type="date" />
      </div>
      <div class="form-row">
        <label class="form-label">Maturity Date</label>
        <input id="f-maturity" type="date" />
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Interest Rate / Returns (%)</label>
      <input id="f-rate" type="number" step="0.01" placeholder="e.g. 7.2" />
    </div>
    <div class="form-row">
      <label class="form-label">Notes</label>
      <input id="f-notes" placeholder="Any additional details..." />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="submitInv()">Save Investment</button>
    </div>
  </div>
</div>

<script>
const CATS = {
  mutual_fund: { label: 'Mutual Fund',    color: '#1D9E75', bg: '#E1F5EE', text: '#085041', icon: 'chart-line' },
  nps:         { label: 'NPS',            color: '#378ADD', bg: '#E6F1FB', text: '#0C447C', icon: 'shield-check' },
  post_office: { label: 'Post Office',    color: '#7F77DD', bg: '#EEEDFE', text: '#3C3489', icon: 'mail' },
  fd:          { label: 'FD / RD',        color: '#BA7517', bg: '#FAEEDA', text: '#633806', icon: 'building-bank' },
  stocks:      { label: 'Stocks',         color: '#639922', bg: '#EAF3DE', text: '#27500A', icon: 'trending-up' },
  epf:         { label: 'EPF / PPF',      color: '#D4537E', bg: '#FBEAF0', text: '#72243E', icon: 'user-shield' },
  gold:        { label: 'Gold / SGB',     color: '#EF9F27', bg: '#FAEEDA', text: '#633806', icon: 'diamond' },
  insurance:   { label: 'Insurance',      color: '#D85A30', bg: '#FAECE7', text: '#712B13', icon: 'heart-rate-monitor' },
  crypto:      { label: 'Crypto',         color: '#F09595', bg: '#FCEBEB', text: '#501313', icon: 'currency-bitcoin' },
  real_estate: { label: 'Real Estate',    color: '#888780', bg: '#F1EFE8', text: '#444441', icon: 'home' },
  other:       { label: 'Other',          color: '#5F5E5A', bg: '#F1EFE8', text: '#2C2C2A', icon: 'briefcase' }
};

let investments = JSON.parse(localStorage.getItem('finvault_data') || '[]');
let activeFilter = 'all';

function save() {
  localStorage.setItem('finvault_data', JSON.stringify(investments));
}

function fmtINR(n) {
  n = parseFloat(n) || 0;
  if (n >= 10000000) return '₹' + (n / 10000000).toFixed(2) + ' Cr';
  if (n >= 100000)   return '₹' + (n / 100000).toFixed(2) + ' L';
  if (n >= 1000)     return '₹' + (n / 1000).toFixed(1) + 'K';
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

function daysUntil(ds) {
  if (!ds) return null;
  return Math.ceil((new Date(ds) - new Date()) / 86400000);
}

function render() {
  renderMetrics();
  renderAlloc();
  renderReminders();
  renderTabs();
  renderList();
}

function renderMetrics() {
  const total    = investments.reduce((s,i) => s + (parseFloat(i.currentValue) || parseFloat(i.invested) || 0), 0);
  const invested = investments.reduce((s,i) => s + (parseFloat(i.invested) || 0), 0);
  const gain     = total - invested;
  const pct      = invested > 0 ? (gain / invested * 100) : 0;
  document.getElementById('metrics-section').innerHTML = `
    <div class="metrics">
      <div class="metric">
        <div class="metric-label"><i class="ti ti-wallet"></i> Total Portfolio Value</div>
        <div class="metric-value">${fmtINR(total)}</div>
        <div class="metric-sub">${investments.length} investment${investments.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="metric">
        <div class="metric-label"><i class="ti ti-cash"></i> Total Invested</div>
        <div class="metric-value">${fmtINR(invested)}</div>
        <div class="metric-sub">Principal amount</div>
      </div>
      <div class="metric">
        <div class="metric-label"><i class="ti ti-trending-up"></i> Overall Gain / Loss</div>
        <div class="metric-value" style="color:${gain >= 0 ? '#0F6E56' : '#A32D2D'}">${gain >= 0 ? '+' : ''}${fmtINR(Math.abs(gain))}</div>
        <div class="metric-sub" style="color:${gain >= 0 ? '#0F6E56' : '#A32D2D'}">${pct >= 0 ? '+' : ''}${pct.toFixed(1)}% overall</div>
      </div>
    </div>`;
}

function renderAlloc() {
  const total = investments.reduce((s,i) => s + (parseFloat(i.currentValue) || parseFloat(i.invested) || 0), 0);
  if (!total) { document.getElementById('alloc-section').innerHTML = ''; return; }
  const map = {};
  investments.forEach(i => {
    const v = parseFloat(i.currentValue) || parseFloat(i.invested) || 0;
    map[i.category] = (map[i.category] || 0) + v;
  });
  const entries = Object.entries(map).sort((a,b) => b[1]-a[1]);
  const bars = entries.map(([c,v]) => {
    const pct = (v/total*100).toFixed(1);
    return `<div style="flex:${pct};background:${CATS[c]?.color||'#888'};min-width:3px" title="${CATS[c]?.label||c}: ${pct}%"></div>`;
  }).join('');
  const legend = entries.map(([c,v]) => {
    const pct = (v/total*100).toFixed(1);
    return `<div class="alloc-item"><div class="alloc-dot" style="background:${CATS[c]?.color||'#888'}"></div>${CATS[c]?.label||c} ${pct}%</div>`;
  }).join('');
  document.getElementById('alloc-section').innerHTML = `
    <div class="section-title"><i class="ti ti-chart-pie"></i> Allocation</div>
    <div class="alloc-bar">${bars}</div>
    <div class="alloc-legend">${legend}</div>`;
}

function renderReminders() {
  const upcoming = investments
    .filter(i => i.maturityDate)
    .map(i => ({ ...i, days: daysUntil(i.maturityDate) }))
    .filter(i => i.days !== null && i.days >= 0 && i.days <= 90)
    .sort((a,b) => a.days - b.days);
  const el = document.getElementById('reminders-section');
  if (!upcoming.length) { el.innerHTML = ''; return; }
  const cards = upcoming.map(i => {
    const c = i.days <= 7 ? '#E24B4A' : i.days <= 30 ? '#BA7517' : '#639922';
    const dateStr = new Date(i.maturityDate).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    return `<div class="reminder">
      <i class="ti ti-bell" style="color:${c}"></i>
      <div class="reminder-body">
        <p><strong>${i.name}</strong> matures in <strong style="color:${c}">${i.days} day${i.days!==1?'s':''}</strong></p>
        <span>${dateStr} · ${CATS[i.category]?.label||i.category} · ${fmtINR(parseFloat(i.currentValue)||parseFloat(i.invested)||0)}</span>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="section-title" style="margin-bottom:10px"><i class="ti ti-bell"></i> Upcoming Maturities</div>${cards}`;
}

function renderTabs() {
  const cats = [...new Set(investments.map(i => i.category))];
  const tabDefs = [{ k:'all', label:'All' }, ...cats.map(c => ({ k:c, label:CATS[c]?.label||c }))];
  document.getElementById('tabs').innerHTML = tabDefs.map(t =>
    `<button class="tab ${activeFilter===t.k?'active':''}" onclick="setTab('${t.k}')">${t.label}</button>`
  ).join('');
}

function setTab(k) {
  activeFilter = k;
  renderTabs();
  renderList();
}

function renderList() {
  const list = activeFilter === 'all' ? investments : investments.filter(i => i.category === activeFilter);
  const el = document.getElementById('inv-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-chart-bar"></i>${activeFilter==='all'?'No investments yet — click "Add Investment" to get started.':'No investments in this category.'}</div>`;
    return;
  }
  el.innerHTML = list.map(inv => {
    const cat = CATS[inv.category] || CATS.other;
    const inv_amt = parseFloat(inv.invested) || 0;
    const cur_amt = parseFloat(inv.currentValue) || inv_amt;
    const gain = cur_amt - inv_amt;
    const gainPct = inv_amt > 0 ? (gain / inv_amt * 100) : 0;
    const gainClass = gain > 0 ? 'gain-pos' : gain < 0 ? 'gain-neg' : 'gain-neu';
    const days = inv.maturityDate ? daysUntil(inv.maturityDate) : null;
    const matLabel = days !== null ? `<span class="inv-meta-text" style="color:${days<=30?'#BA7517':'#639922'}"><i class="ti ti-calendar" style="font-size:11px"></i> ${days}d</span>` : '';
    const rateLabel = inv.rate ? `<span class="inv-meta-text">${inv.rate}% p.a.</span>` : '';
    const realIdx = investments.indexOf(inv);
    return `<div class="inv-card">
      <div class="inv-icon" style="background:${cat.bg};color:${cat.color}"><i class="ti ti-${cat.icon}"></i></div>
      <div class="inv-main">
        <div class="inv-name">${inv.name}</div>
        <div class="inv-meta">
          <span class="badge" style="background:${cat.bg};color:${cat.text}">${cat.label}</span>
          ${inv.platform ? `<span class="inv-meta-text">${inv.platform}</span>` : ''}
          ${rateLabel}
          ${matLabel}
        </div>
      </div>
      <div class="inv-right">
        <div class="inv-amount">${fmtINR(cur_amt)}</div>
        ${inv_amt > 0 && cur_amt !== inv_amt
          ? `<div class="inv-gain ${gainClass}">${gain >= 0 ? '+' : ''}${gainPct.toFixed(1)}%</div>`
          : `<div class="inv-gain gain-neu">${fmtINR(inv_amt)} inv.</div>`}
      </div>
      <button class="del-btn" onclick="deleteInv(${realIdx})" title="Delete" aria-label="Delete ${inv.name}"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('');
}

function deleteInv(idx) {
  if (confirm(`Remove "${investments[idx].name}"?`)) {
    investments.splice(idx, 1);
    save();
    activeFilter = 'all';
    render();
  }
}

// Modal
function openModal() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-platform').value = '';
  document.getElementById('f-invested').value = '';
  document.getElementById('f-current').value = '';
  document.getElementById('f-start').value = '';
  document.getElementById('f-maturity').value = '';
  document.getElementById('f-rate').value = '';
  document.getElementById('f-notes').value = '';
  // Populate category select
  const sel = document.getElementById('f-cat');
  sel.innerHTML = Object.entries(CATS).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join('');
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function submitInv() {
  const name = document.getElementById('f-name').value.trim();
  const invested = document.getElementById('f-invested').value;
  if (!name || !invested) { alert('Please fill in Name and Amount Invested.'); return; }
  investments.push({
    id: Date.now(),
    name,
    category: document.getElementById('f-cat').value,
    platform: document.getElementById('f-platform').value.trim(),
    invested: parseFloat(invested),
    currentValue: document.getElementById('f-current').value ? parseFloat(document.getElementById('f-current').value) : null,
    startDate: document.getElementById('f-start').value,
    maturityDate: document.getElementById('f-maturity').value,
    rate: document.getElementById('f-rate').value ? parseFloat(document.getElementById('f-rate').value) : null,
    notes: document.getElementById('f-notes').value.trim(),
    addedAt: new Date().toISOString()
  });
  save();
  closeModal();
  activeFilter = 'all';
  render();
}

// Export CSV
function exportCSV() {
  if (!investments.length) { alert('No investments to export.'); return; }
  const headers = ['Name','Category','Platform','Invested (₹)','Current Value (₹)','Gain/Loss (₹)','Return (%)','Start Date','Maturity Date','Rate (%)','Notes'];
  const rows = investments.map(i => {
    const inv = parseFloat(i.invested) || 0;
    const cur = parseFloat(i.currentValue) || inv;
    const gain = cur - inv;
    const pct = inv > 0 ? (gain/inv*100).toFixed(2) : 0;
    return [i.name, CATS[i.category]?.label||i.category, i.platform||'', inv, cur, gain.toFixed(0), pct, i.startDate||'', i.maturityDate||'', i.rate||'', i.notes||''].map(v => `"${v}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `finvault_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

render();
</script>
</body>
</html>
